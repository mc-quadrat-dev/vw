<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lern Technologie - Keyvisual Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background-color: #0040c5;
      width: 100vw;
      height: 100vh;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }
    
    #main-view {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .inner-glow {
      position: absolute; pointer-events: none; border-radius: 50%;
      background: radial-gradient(circle closest-side, rgba(0, 64, 197, 0.44) 0%, rgba(0, 64, 197, 0) 100%);
      transform: translate(-50%, -50%); z-index: 9;
    }

    .arrow {
      position: absolute; z-index: 3; will-change: transform; transition: none;
      background-color: currentColor;
      -webkit-mask: var(--arrow-url) center/100% 100% no-repeat;
      mask: var(--arrow-url) center/100% 100% no-repeat;
    }
    .grain-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2;
      background-repeat: no-repeat;
      background-position: top center;
      background-size: cover;
    }
    .arrow img { display: block; width: 100%; height: 100%; }

    .star {
      position: absolute; z-index: 10; cursor: grab; transform: translate(-50%, -50%);
    }
    .star.dragging { cursor: grabbing; }
    .star img { display: block; width: 100%; height: 100%; }

    .controls-bar {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      background: rgba(10,26,74,0.7); backdrop-filter: blur(8px);
      border: 1px solid rgba(0,64,197,0.3); border-radius: 12px;
      padding: 10px 16px; color: rgba(255,255,255,0.7); font-size: 12px;
    }

    .scale-group { display: flex; align-items: center; gap: 8px; }
    .scale-dual { display: flex; flex-direction: column; gap: 4px; }
    .scale-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
    .scale-row label { min-width: 42px; color: rgba(255,255,255,0.5); font-size: 10px; }

    input[type=range] {
      -webkit-appearance: none; appearance: none; width: 120px; height: 4px; border-radius: 2px;
      background: rgba(0,64,197,0.4); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: #dc328a; border: 2px solid rgba(255,255,255,0.3);
    }
    .scale-value { min-width: 32px; text-align: center; color: #dc328a; font-weight: 600; font-size: 11px; }

    .lock-btn {
      background: none; border: 1px solid rgba(0,64,197,0.4); display: flex; align-items: center; justify-content: center; width: 26px; height: 26px;
      color: rgba(255,255,255,0.7); border-radius: 6px; padding: 0; margin: 0;
      cursor: pointer; transition: background 0.15s;
      -webkit-appearance: none; appearance: none; font-family: inherit;
    }
    .lock-btn svg { width: 14px; height: 14px; }
    .lock-btn:hover { background: rgba(0,64,197,0.25); }
    .lock-btn.locked { color: #dc328a; }

    .ctrl-btn {
      background: rgba(0,64,197,0.25); border: 1px solid rgba(0,64,197,0.4);
      color: rgba(255,255,255,0.8); border-radius: 8px; padding: 5px 12px; margin: 0;
      font-size: 12px; cursor: pointer; transition: background 0.15s; font-family: inherit;
      -webkit-appearance: none; appearance: none;
    }
    .ctrl-btn:hover { background: rgba(0,64,197,0.45); }
    .ctrl-btn.primary { background: #dc328a; color: #fff; border: none; font-weight: bold; }
    .ctrl-btn.primary:hover { background: #e84da0; }

    .icon-btn {
      background: rgba(0,64,197,0.25); border: 1px solid rgba(0,64,197,0.4);
      color: rgba(255,255,255,0.8); border-radius: 8px; padding: 5px 8px; margin: 0;
      cursor: pointer; transition: background 0.15s; font-family: inherit;
      -webkit-appearance: none; appearance: none; display: flex; align-items: center; justify-content: center;
    }
    .icon-btn:hover { background: rgba(0,64,197,0.45); }
    .icon-btn.danger:hover { background: rgba(220,50,50,0.5); }

    .move-btn {
      background: rgba(0,64,197,0.25); border: 1px solid rgba(0,64,197,0.4);
      color: rgba(255,255,255,0.8); border-radius: 8px; padding: 5px 8px; margin: 0;
      cursor: grab; transition: background 0.15s; font-family: inherit;
      -webkit-appearance: none; appearance: none; display: flex; align-items: center; justify-content: center;
      position: absolute; z-index: 60; top: -40px; right: 0;
    }
    .move-btn:hover { background: rgba(0,64,197,0.45); }
    .move-btn:active { cursor: grabbing; }

    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: center;
    }
    #modal-overlay.visible { display: flex; }
    #modal {
      background: #0d2266; border: 1px solid rgba(0,64,197,0.4); border-radius: 16px;
      padding: 28px 32px; width: 320px; color: rgba(255,255,255,0.85);
    }
    .modal-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .modal-input {
      background: rgba(10,26,74,0.8); border: 1px solid rgba(0,64,197,0.4);
      border-radius: 8px; color: #fff; padding: 7px 10px; font-size: 13px; width: 100%;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .format-btn { 
      padding: 5px 8px; font-size: 11px; background: rgba(0,64,197,0.15); 
      border: 1px solid rgba(0,64,197,0.3); border-radius: 6px; cursor: pointer; 
      color: #fff; transition: background 0.1s; 
      -webkit-appearance: none; appearance: none; margin: 0 6px 6px 0; font-family: inherit;
    }
    .format-btn:hover { background: rgba(0,64,197,0.4); }

    #editor-view {
      display: none; position: fixed; inset: 0; z-index: 50; background: #060e2a;
      flex-direction: column; overflow: hidden;
    }
    #editor-view.visible { display: flex; }
    
    #editor-wrapper {
      position: relative;
    }

    .editor-header {
      padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(10,26,74,0.5); border-bottom: 1px solid rgba(0,64,197,0.2);
    }
    .editor-title { color: #fff; font-weight: 600; }
    .editor-header-right { display: flex; gap: 8px; align-items: center; }
    
    .editor-content {
      flex: 1; display: flex; justify-content: center; align-items: center;
      overflow: auto; padding: 24px; position: relative;
    }

    .editor-panel {
      position: relative; background-color: #0040c5; overflow: hidden;
      border: 1px solid rgba(0,64,197,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .editor-footer {
      padding: 16px; display: flex; justify-content: center; align-items: center; gap: 12px;
      background: rgba(10,26,74,0.5); border-top: 1px solid rgba(0,64,197,0.2);
      flex-wrap: wrap;
    }

    .editor-scale-bar {
      display: flex; align-items: center; gap: 10px;
      background: rgba(10,26,74,0.7);
      border: 1px solid rgba(0,64,197,0.3); border-radius: 10px;
      padding: 8px 14px; color: rgba(255,255,255,0.7); font-size: 12px;
      margin-left: 24px;
    }
    
    .pagination-text { color: #fff; font-size: 14px; min-width: 100px; text-align: center; }
  </style>
</head>
<body>

  <div id="main-view">
    <div class="inner-glow" id="main-inner-glow"></div>
    <div class="grain-layer" id="main-grain"></div>
    <div class="star" id="main-star"></div>
  </div>

  <div class="controls-bar" id="main-controls">
    <label>Skalierung</label>
    <div class="scale-group" id="main-scale-group">
      <div id="main-scale-single">
        <input type="range" id="main-scale-slider" min="1" max="8" value="2" step="1">
        <span class="scale-value" id="main-scale-value">2</span>
      </div>
      <div class="scale-dual" id="main-scale-dual" style="display:none;">
        <div class="scale-row">
          <label>Grid</label>
          <input type="range" id="main-arrow-scale-slider" min="1" max="8" value="2" step="1" style="width:90px;">
          <span class="scale-value" id="main-arrow-scale-value">2</span>
        </div>
        <div class="scale-row">
          <label>Fokus</label>
          <input type="range" id="main-star-scale-slider" min="1" max="8" value="2" step="1" style="width:90px;">
          <span class="scale-value" id="main-star-scale-value">2</span>
        </div>
      </div>
      <button class="lock-btn locked" id="main-lock-btn" title="Skalierung koppeln/entkoppeln">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </button>
    </div>
    <button class="ctrl-btn primary" id="btn-open-layout-modal" style="margin-left:8px;">Layouts</button>
  </div>

  <div id="editor-view">
    <div class="editor-header">
      <button class="ctrl-btn" id="btn-leave-editor" style="font-size:18px; font-weight:bold; padding: 4px 14px;">←</button>
      <div class="editor-title" id="editor-title-text">Layout (1920×1080)</div>
      <div class="editor-header-right">
        <button class="icon-btn danger" id="btn-delete-page" title="Seite löschen" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
        <button class="ctrl-btn primary" id="btn-download-svg" style="display:flex; align-items:center; gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          SVG
        </button>
        <button class="ctrl-btn primary" id="btn-download" style="display:flex; align-items:center; gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          PNG
        </button>
      </div>
    </div>
    <div class="editor-content" id="editor-scroll-area">
      <div id="editor-wrapper">
        <button class="move-btn" id="btn-move-canvas" title="Grid verschieben">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"></polyline><polyline points="9 5 12 2 15 5"></polyline><polyline points="15 19 12 22 9 19"></polyline><polyline points="19 9 22 12 19 15"></polyline><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
        </button>
        <div class="editor-panel" id="editor-panel">
          <div class="inner-glow" id="ed-inner-glow"></div>
          <div class="grain-layer" id="ed-grain"></div>
          <div class="star" id="ed-star"></div>
        </div>
      </div>
    </div>
    <div class="editor-footer">
      <button class="ctrl-btn" id="btn-prev-page">◀</button>
      <div class="pagination-text" id="pagination-text">Seite 1 von 1</div>
      <button class="ctrl-btn" id="btn-next-page">▶</button>
      <button class="ctrl-btn" id="btn-add-page" style="margin-left:24px;">+ Seite hinzufügen</button>
      <div class="editor-scale-bar" id="ed-scale-bar">
        <label>Skalierung</label>
        <div class="scale-group" id="ed-scale-group">
          <div id="ed-scale-single">
            <input type="range" id="ed-scale-slider" min="1" max="8" value="2" step="1">
            <span class="scale-value" id="ed-scale-value">2</span>
          </div>
          <div class="scale-dual" id="ed-scale-dual" style="display:none;">
            <div class="scale-row">
              <label>Grid</label>
              <input type="range" id="ed-arrow-scale-slider" min="1" max="8" value="2" step="1" style="width:90px;">
              <span class="scale-value" id="ed-arrow-scale-value">2</span>
            </div>
            <div class="scale-row">
              <label>Fokus</label>
              <input type="range" id="ed-star-scale-slider" min="1" max="8" value="2" step="1" style="width:90px;">
              <span class="scale-value" id="ed-star-scale-value">2</span>
            </div>
          </div>
          <button class="lock-btn locked" id="ed-lock-btn" title="Skalierung koppeln/entkoppeln">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <h2 style="margin-bottom:16px;">Neues Format</h2>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px; color:#aaa; display:block; margin-bottom:8px;">Vorlagen</label>
        <div style="display:flex; flex-wrap:wrap;">
          <button class="format-btn" data-w="1920" data-h="1080">16:9</button>
          <button class="format-btn" data-w="1080" data-h="1350">4:5</button>
          <button class="format-btn" data-w="1000" data-h="1000">1:1</button>
          <button class="format-btn" data-w="1400" data-h="300">Banner</button>
        </div>
      </div>
      <div class="modal-row">
        <div>
          <label style="font-size:12px; color:#aaa;">Breite</label>
          <input type="number" class="modal-input" id="fmt-width" placeholder="1920" value="1920">
        </div>
        <div>
          <label style="font-size:12px; color:#aaa;">Höhe</label>
          <input type="number" class="modal-input" id="fmt-height" placeholder="1080" value="1080">
        </div>
      </div>
      <div class="modal-actions">
        <button class="ctrl-btn" id="btn-modal-cancel">Abbrechen</button>
        <button class="ctrl-btn primary" id="btn-modal-confirm">Erstellen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
